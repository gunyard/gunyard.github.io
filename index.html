<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUNYARD</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hero {
            padding: 60px 20px 40px; /* reduced height */
        }

        h1 {
            font-size: 3rem; /* slightly smaller */
            letter-spacing: 0.12em;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.3rem;
            font-weight: normal;
            opacity: 0.85;
            margin: 0;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.7;
            margin-top: 14px;
            margin-bottom: 28px; /* creates space above button */
        }

        .button {
            padding: 12px 28px;
            background: #222;
            color: #e6e6e6;
            border: 1px solid #444;
            border-radius: 4px;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.2s;
        }

        .button:hover {
            background: #333;
            border-color: #666;
        }

        .principle {
            margin: 40px 20px; /* reduced spacing */
            font-size: 1.2rem;
            opacity: 0.85;
        }

        .forum-strip {
            width: 100%;
            padding: 16px 0;
            background: #111;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            font-size: 1rem;
        }

        .forum-strip a {
            color: #e6e6e6;
            text-decoration: none;
        }

        footer {
            margin: 30px 0 20px; /* reduced footer spacing */
            font-size: 0.85rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>GUNYARD</h1>
        <h2>To protect and practice American Liberty</h2>
        <div class="subtitle">The freedom to speak, think, arm, and defend.</div>
        <a class="button" href="https://forum.gunyard.com">Enter the Yard</a>
    </div>

    <div class="principle">
        Respected privacy. Responsible liberty.
    </div>

    <div class="forum-strip">
        <a href="https://forum.gunyard.com">forum.gunyard.com — Join the conversation</a>
    </div>

    <footer>
        © GUNYARD v1.x 2026.
    </footer>

</body>
</html>
