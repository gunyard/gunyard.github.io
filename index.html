<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUNYARD</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hero {
            padding: 120px 20px 80px;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 0.12em;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: normal;
            opacity: 0.85;
            margin-top: 0;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-top: 10px;
        }

        .button {
            margin-top: 40px;
            padding: 14px 32px;
            background: #222;
            color: #e6e6e6;
            border: 1px solid #444;
            border-radius: 4px;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.2s;
        }

        .button:hover {
            background: #333;
            border-color: #666;
        }

        .principle {
            margin: 80px 20px;
            font-size: 1.3rem;
            opacity: 0.85;
        }

        .forum-strip {
            width: 100%;
            padding: 20px 0;
            background: #111;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            margin-top: 40px;
            font-size: 1.1rem;
        }

        .forum-strip a {
            color: #e6e6e6;
            text-decoration: none;
        }

        footer {
            margin: 60px 0 40px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>GUNYARD</h1>
        <h2>To protect and practice American Liberty</h2>
        <div class="subtitle">The freedom to speak, think, arm, and defend.</div>
        <a class="button" href="https://forum.gunyard.com">Enter the Forum</a>
    </div>

    <div class="principle">
        Respected privacy. Responsible liberty.
    </div>

    <div class="forum-strip">
        <a href="https://forum.gunyard.com">forum.gunyard.com — Join the conversation</a>
    </div>

    <footer>
        © GUNYARD<br>
        Respected privacy. Responsible liberty.
    </footer>

</body>
</html>
